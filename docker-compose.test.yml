services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: sequa
      POSTGRES_DB: sequa_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sequa_test"]
      interval: 2s
      timeout: 3s
      retries: 15
  test:
    # debian-based golang ships gcc, required for cgo (pg_query_go / libpg_query).
    image: golang:1.26
    working_dir: /app
    volumes:
      - .:/app
      - sequa-gocache:/root/.cache/go-build
      - sequa-gomod:/go/pkg/mod
    environment:
      CGO_ENABLED: "1"
      GOFLAGS: "-count=1"
      SEQUA_TEST_DATABASE_URL: "postgres://postgres:sequa@postgres:5432/sequa_test?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    # -p 1 serializes package test binaries so the integration tests (which
    # share one Postgres) don't race on CREATE TABLE / schema_migrations.
    command: ["go", "test", "-p", "1", "./..."]

volumes:
  sequa-gocache:
  sequa-gomod:
