# GoReleaser v2 config for sequa.
# sequa's `generate` uses pg_query_go (libpg_query, cgo), so releases
# cross-compile with zig as the C toolchain. macOS builds need a native runner
# or the macOS SDK and are deliberately out of scope here (see BACKLOG).
version: 2

project_name: sequa

before:
  hooks:
    - go mod tidy

builds:
  - id: sequa
    main: ./cmd/sequa
    binary: sequa
    env:
      - CGO_ENABLED=1
      # libpg_query (pg_query_go) declares strchrnul itself; zig's glibc headers
      # already declare it. Tell the port code it exists so it skips its copy.
      - CGO_CFLAGS=-DHAVE_STRCHRNUL
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-linux-gnu
          - CXX=zig c++ -target x86_64-linux-gnu
      - goos: linux
        goarch: arm64
        env:
          - CC=zig cc -target aarch64-linux-gnu
          - CXX=zig c++ -target aarch64-linux-gnu
      - goos: windows
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-windows-gnu
          - CXX=zig c++ -target x86_64-windows-gnu

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^build:'
      - 'Merge pull request'

release:
  github:
    owner: inovacc
    name: sequa
