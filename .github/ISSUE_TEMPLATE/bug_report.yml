name: Bug report
description: Report a defect in sequa
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please include enough to reproduce.
  - type: input
    id: version
    attributes:
      label: sequa version / commit
      placeholder: v0.1.0 or a commit SHA
    validations:
      required: true
  - type: dropdown
    id: verb
    attributes:
      label: Which verb?
      options: [migrate, generate, query, verify, "pkg/sequa (library)", other]
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, what you got. Include the exact command and any error output.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A small migration/query/schema that triggers it, if applicable.
      render: sql
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: OS, Go version, Postgres version
    validations:
      required: true
