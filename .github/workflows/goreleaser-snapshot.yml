name: GoReleaser snapshot

# Verifies the release config actually cross-compiles (incl. cgo/libpg_query via
# zig) without publishing. Runs when the release config changes, or on demand.
on:
  pull_request:
    paths:
      - .goreleaser.yaml
      - .github/workflows/release.yml
      - .github/workflows/goreleaser-snapshot.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: build --snapshot --clean
