name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # pg_query_go (libpg_query) requires cgo; ubuntu-latest ships gcc.
  CGO_ENABLED: "1"

jobs:
  build-test:
    name: build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (short, race)
        run: go test -short -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install golangci-lint v2 (built with the job's Go toolchain)
        # Building from source (not the prebuilt release) ensures golangci-lint's
        # own Go build version is >= the module's targeted Go version.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
      - name: Lint
        run: "$(go env GOPATH)/bin/golangci-lint run ./..."

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          "$(go env GOPATH)/bin/govulncheck" ./...

  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  integration:
    name: integration (real Postgres)
    runs-on: ubuntu-latest
    env:
      SEQUA_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/sequa_test?sslmode=disable
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sequa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Full suite with race + coverage (serialized; integration tests hit Postgres)
        run: |
          go test -race -p 1 -covermode=atomic -coverprofile=coverage.out ./...
          {
            echo "### Coverage"
            echo '```'
            go tool cover -func=coverage.out | tail -1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Coverage gate (ratchet floor)
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          floor=66.0
          echo "total coverage: ${total}% (floor ${floor}%)"
          awk -v t="$total" -v f="$floor" 'BEGIN { if (t+0 < f+0) exit 1 }' \
            || { echo "::error::coverage ${total}% is below the ${floor}% floor — raise coverage or lower the floor deliberately"; exit 1; }
      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
